<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Notiminder</title>
<meta name="theme-color" content="#f5f5f7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Notiminder">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<style>
:root{
  color-scheme:light dark;
  --bg:#f5f5f7;
  --surface:#ffffff;
  --surface-2:#eeeeef;
  --surface-3:#e5e5ea;
  --text:#111114;
  --muted:#6f737a;
  --faint:#9ca0a6;
  --line:rgba(60,60,67,.14);
  --accent:#007aff;
  --accent-2:#2f8cff;
  --green:#34c759;
  --red:#ff3b30;
  --shadow:0 16px 44px rgba(0,0,0,.08);
  --radius:28px;
  --radius-sm:18px;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;
  --mono:"SFMono-Regular",Consolas,monospace;
}

@media (prefers-color-scheme:dark){
  :root{
    --bg:#000000;
    --surface:#1c1c1e;
    --surface-2:#2c2c2e;
    --surface-3:#3a3a3c;
    --text:#f5f5f7;
    --muted:#a8a8ad;
    --faint:#6f737a;
    --line:rgba(255,255,255,.12);
    --accent:#0a84ff;
    --accent-2:#5aa7ff;
    --shadow:none;
  }
  .reminder-row:not(.off) .tag{color:#b8b8be}
}

*{box-sizing:border-box}
html{min-height:100%;background:var(--bg)}
body{
  margin:0;
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  letter-spacing:0;
}
button,input,select,textarea{font:inherit}
button{cursor:pointer;color:inherit}
svg{display:block}
.hidden{display:none!important}

.app-frame{
  width:min(100%,560px);
  margin:0 auto;
  padding:18px 16px max(30px,env(safe-area-inset-bottom));
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:4px 2px 18px;
}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.brand-mark{
  width:42px;
  height:42px;
  border-radius:14px;
  display:grid;
  place-items:center;
  color:#fff;
  background:linear-gradient(150deg,var(--accent),#68c6ff);
  box-shadow:0 10px 28px rgba(0,122,255,.28);
}
.brand h1{
  margin:0;
  font-size:34px;
  line-height:1.05;
  font-weight:780;
  letter-spacing:0;
}
.brand p{display:none}
.top-actions{display:flex;align-items:center;gap:8px}
.install-btn,
.permission-btn{
  border:0;
  min-height:42px;
  border-radius:999px;
  background:var(--surface);
  color:var(--text);
  box-shadow:var(--shadow);
  border:1px solid var(--line);
}
.install-btn{
  width:42px;
  display:grid;
  place-items:center;
}
.permission-btn{
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px 12px 6px 8px;
}
.permission-icon{
  width:30px;
  height:30px;
  border-radius:50%;
  display:grid;
  place-items:center;
  color:#fff;
  background:var(--green);
}
.permission-copy{display:flex;flex-direction:column;align-items:flex-start;line-height:1.05}
.permission-copy span{font-size:11px;color:var(--muted);font-weight:590}
.permission-copy strong{margin-top:2px;font-size:13px;color:var(--green);font-weight:760}

main{display:grid;gap:18px}
.section-title{
  margin:0 2px 8px;
  color:var(--muted);
  font-size:13px;
  font-weight:700;
  text-transform:uppercase;
}
.group{
  overflow:hidden;
  border-radius:var(--radius);
  background:var(--surface);
  box-shadow:var(--shadow);
  border:1px solid var(--line);
}
.composer{padding:18px;display:grid;gap:16px}

.dial-row{
  display:grid;
  grid-template-columns:170px 1fr;
  gap:18px;
  align-items:center;
}
.time-dial{
  --dial-angle:180deg;
  position:relative;
  width:170px;
  aspect-ratio:1;
  border:0;
  border-radius:50%;
  padding:0;
  background:
    radial-gradient(circle at center,var(--surface) 0 57%,transparent 58%),
    conic-gradient(var(--accent) 0 var(--dial-angle),var(--surface-3) var(--dial-angle) 360deg);
  box-shadow:inset 0 0 0 1px var(--line),0 8px 26px rgba(0,122,255,.12);
  touch-action:none;
  transition:transform .18s ease;
}
.time-dial:active{transform:scale(.985)}
.time-dial:focus-visible{outline:4px solid color-mix(in srgb,var(--accent) 24%,transparent);outline-offset:4px}
.time-dial::after{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  width:12px;
  height:12px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:var(--accent);
}
.dial-hand{
  position:absolute;
  inset:0;
  transform:rotate(var(--dial-angle));
  transition:transform .34s cubic-bezier(.2,.85,.2,1);
}
.dial-hand::before{
  content:"";
  position:absolute;
  left:calc(50% - 2px);
  top:20%;
  width:4px;
  height:31%;
  border-radius:999px;
  background:var(--accent);
}
.dial-readout{
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  pointer-events:none;
  text-align:center;
}
.dial-readout strong{
  display:block;
  font-size:33px;
  line-height:1;
  font-weight:800;
  letter-spacing:0;
}
.dial-readout span{
  display:block;
  margin-top:7px;
  color:var(--muted);
  font-size:12px;
  font-weight:650;
}
.dial-sweep,.dial-hub,.dial-number{display:none}
.dial-side{min-width:0}
.mini-stat{
  color:var(--muted);
  font-size:14px;
  line-height:1.35;
}
.mini-stat strong{
  display:block;
  color:var(--text);
  font-size:19px;
  margin-bottom:3px;
}
.ampm{
  display:inline-grid;
  grid-template-columns:1fr 1fr;
  margin-top:14px;
  padding:3px;
  border-radius:999px;
  background:var(--surface-2);
}
.ampm button{
  min-width:54px;
  height:34px;
  border:0;
  border-radius:999px;
  background:transparent;
  color:var(--muted);
  font-size:13px;
  font-weight:760;
}
.ampm button.active{
  background:var(--surface);
  color:var(--accent);
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.text-field{
  width:100%;
  min-height:58px;
  resize:none;
  border:0;
  outline:none;
  border-radius:20px;
  background:var(--surface-2);
  color:var(--text);
  padding:17px 18px;
  font-size:17px;
  line-height:1.35;
}
.text-field::placeholder{color:var(--faint)}

.mode-tabs{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:4px;
  padding:4px;
  border-radius:18px;
  background:var(--surface-2);
}
.mode-tab{
  min-width:0;
  min-height:42px;
  border:0;
  border-radius:14px;
  background:transparent;
  color:var(--muted);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  padding:0 6px;
  font-size:13px;
  font-weight:720;
}
.mode-tab svg{width:16px;height:16px}
.mode-tab.active{
  background:var(--surface);
  color:var(--accent);
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.option-grid{display:grid}
.config{
  display:none;
  align-items:center;
  flex-wrap:wrap;
  gap:9px;
  min-height:52px;
  padding:12px 14px;
  border-radius:20px;
  background:var(--surface-2);
}
.config.active{display:flex;animation:softIn .18s ease both}
.field-label{
  color:var(--muted);
  font-size:14px;
  font-weight:680;
}
input[type=number],input[type=time],select{
  height:38px;
  border:0;
  outline:none;
  border-radius:14px;
  background:var(--surface);
  color:var(--text);
  padding:0 12px;
  font-size:15px;
  font-weight:680;
  border:1px solid var(--line);
}
input[type=number]{width:84px;text-align:center}
input[type=time]{width:128px}
select{min-width:122px}

.composer-actions{
  display:grid;
  grid-template-columns:1fr 1.4fr;
  gap:10px;
}
.ghost-btn,.add-btn,.tool-btn{
  border:0;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  font-weight:760;
}
.ghost-btn{
  min-height:50px;
  background:var(--surface-2);
  color:var(--accent);
  font-size:14px;
}
.add-btn{
  min-height:50px;
  background:var(--accent);
  color:#fff;
  font-size:16px;
  box-shadow:0 10px 26px rgba(0,122,255,.25);
}
.add-btn:active,.ghost-btn:active,.tool-btn:active,.mode-tab:active{transform:scale(.985)}

.summary{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:15px 18px;
}
.stat{
  min-width:0;
  display:flex;
  align-items:center;
  gap:10px;
}
.stat-icon{
  width:34px;
  height:34px;
  display:grid;
  place-items:center;
  border-radius:50%;
  color:#fff;
  background:var(--accent);
}
.stat.coral .stat-icon{background:var(--red)}
.stat.blue .stat-icon{background:var(--green)}
.stat-copy{min-width:0}
.stat strong{
  display:block;
  font-size:20px;
  line-height:1;
}
.stat-copy span{
  display:block;
  margin-top:3px;
  color:var(--muted);
  font-size:12px;
}
.summary .stat:nth-child(2),
.summary .stat:nth-child(3){display:none}

.list-head{
  min-height:54px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  border-bottom:1px solid var(--line);
}
.list-title{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:17px;
  font-weight:760;
}
.count-chip{
  min-width:24px;
  height:24px;
  display:grid;
  place-items:center;
  border-radius:999px;
  background:var(--surface-2);
  color:var(--muted);
  font-size:12px;
  font-family:var(--mono);
}
.list-head .ghost-btn{
  min-height:36px;
  border-radius:999px;
  padding:0 12px;
  font-size:13px;
}
.reminder-list{display:grid}
.reminder-row{
  display:grid;
  grid-template-columns:1fr auto;
  gap:12px;
  align-items:center;
  min-height:82px;
  padding:14px 16px;
  border-bottom:1px solid var(--line);
  animation:softIn .18s ease both;
}
.reminder-row:last-child{border-bottom:0}
.reminder-row.firing{background:color-mix(in srgb,var(--accent) 9%,transparent)}
.accent-line{display:none}
.reminder-main{min-width:0}
.reminder-name{
  color:var(--text);
  font-size:17px;
  font-weight:720;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.reminder-row.off .reminder-name{color:var(--muted)}
.reminder-meta{
  display:flex;
  align-items:center;
  gap:6px;
  margin-top:5px;
  min-width:0;
}
.tag{
  color:var(--muted);
  font-size:13px;
  font-weight:560;
  white-space:nowrap;
}
.reminder-row:not(.off) .tag{color:#5d636b}
.tag.blue{display:none}
.next-cell{
  grid-column:1;
  color:var(--accent);
  font-size:13px;
  font-weight:650;
}
.next-cell strong{
  font-family:var(--mono);
  font-size:14px;
}
.next-cell span{
  color:var(--muted);
  margin-left:6px;
}
.progress{
  height:3px;
  border-radius:999px;
  background:var(--surface-3);
  margin-top:10px;
  overflow:hidden;
}
.progress > i{
  display:block;
  width:100%;
  height:100%;
  border-radius:inherit;
  background:var(--accent);
  transition:width .7s linear;
}
.switch{
  grid-column:2;
  grid-row:1 / span 2;
  position:relative;
  width:52px;
  height:32px;
  border:0;
  border-radius:999px;
  background:var(--surface-3);
  padding:0;
}
.switch::after{
  content:"";
  position:absolute;
  width:28px;
  height:28px;
  top:2px;
  left:2px;
  border-radius:50%;
  background:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
  transition:transform .18s ease;
}
.switch.on{background:var(--green)}
.switch.on::after{transform:translateX(20px)}
.row-tools{
  grid-column:1 / -1;
  display:flex;
  gap:8px;
  margin-top:2px;
}
.tool-btn{
  min-height:36px;
  padding:0 12px;
  background:var(--surface-2);
  color:var(--accent);
  font-size:13px;
}
.tool-btn.delete{color:var(--red)}

.empty{
  min-height:160px;
  display:grid;
  place-items:center;
  padding:28px;
  color:var(--muted);
  text-align:center;
}
.empty svg{margin:0 auto 12px;color:var(--accent)}
.empty strong{display:block;color:var(--text);font-size:17px;margin-bottom:4px}
.empty span{font-size:14px}

.toast{
  position:fixed;
  left:50%;
  top:max(16px,env(safe-area-inset-top));
  z-index:50;
  width:min(420px,calc(100vw - 28px));
  transform:translateX(-50%);
  border-radius:22px;
  background:color-mix(in srgb,var(--surface) 88%,transparent);
  color:var(--text);
  box-shadow:0 18px 50px rgba(0,0,0,.16);
  border:1px solid var(--line);
  backdrop-filter:blur(18px);
  padding:12px;
  display:flex;
  align-items:center;
  gap:10px;
  animation:toastIn .22s ease both;
}
.toast strong{display:block;font-size:14px}
.toast span{display:block;margin-top:2px;color:var(--muted);font-size:12px}
.toast button{
  margin-left:auto;
  border:0;
  width:30px;
  height:30px;
  border-radius:50%;
  background:var(--surface-2);
}

@keyframes softIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-8px)}to{opacity:1;transform:translate(-50%,0)}}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
}

@media (min-width:820px){
  .app-frame{width:min(100%,720px);padding-top:28px}
  .brand h1{font-size:38px}
}

@media (max-width:460px){
  .app-frame{padding:14px 10px max(20px,env(safe-area-inset-bottom))}
  .brand h1{font-size:28px}
  .brand-mark{width:38px;height:38px;border-radius:13px}
  .permission-copy span{display:none}
  .permission-btn{padding-right:10px}
  .dial-row{grid-template-columns:142px 1fr;gap:12px}
  .time-dial{width:142px}
  .dial-readout strong{font-size:28px}
  .mode-tabs{grid-template-columns:repeat(3,1fr)}
  .mode-tab{font-size:12px}
  .composer-actions{grid-template-columns:1fr}
  .summary{padding:14px 16px}
}
</style>
</head>
<body>
<div class="app-frame">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8a6 6 0 1 0-12 0c0 7-3 8-3 8h18s-3-1-3-8"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
      </div>
      <div>
        <h1>Notiminder</h1>
        <p>Native reminders, tuned from one dial.</p>
      </div>
    </div>
    <div class="top-actions">
      <button class="install-btn hidden" id="installBtn" type="button" aria-label="Install app" title="Install app">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 21h14"></path>
        </svg>
      </button>
      <button class="permission-btn" id="notifyBtn" type="button">
        <span class="permission-icon" aria-hidden="true" id="notifyIcon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 13c0 5-3.5 7-8 9-4.5-2-8-4-8-9V5l8-3 8 3v8Z"></path>
            <path d="m9 12 2 2 4-5"></path>
          </svg>
        </span>
        <span class="permission-copy">
          <span>Alerts</span>
          <strong id="notifyState">Checking</strong>
        </span>
      </button>
    </div>
  </header>

  <main>
    <section>
      <h2 class="section-title">New reminder</h2>
      <div class="group composer">
        <div class="dial-row">
          <button class="time-dial" id="timeDial" type="button" aria-label="Reminder time dial" aria-valuemin="0" aria-valuemax="1439" aria-valuenow="540">
            <span class="dial-sweep" aria-hidden="true"></span>
            <span class="dial-hand" id="dialHand" aria-hidden="true"></span>
            <span class="dial-hub" aria-hidden="true"></span>
            <span class="dial-number n0">00</span>
            <span class="dial-number n15">15</span>
            <span class="dial-number n30">30</span>
            <span class="dial-number n45">45</span>
            <span class="dial-readout">
              <span>
                <strong id="dialMain">30m</strong>
                <span id="dialSub">Every 30 minutes</span>
              </span>
            </span>
          </button>
          <div class="dial-side">
            <div class="mini-stat">
              <strong id="nextMini">No reminders</strong>
              <span>next alert</span>
            </div>
            <div class="ampm" id="ampmGroup" aria-label="AM PM">
              <button type="button" data-period="AM" class="active">AM</button>
              <button type="button" data-period="PM">PM</button>
            </div>
          </div>
        </div>

        <textarea class="text-field" id="reminderName" maxlength="120" placeholder="Reminder name"></textarea>

        <div class="mode-tabs" role="tablist" aria-label="Schedule mode">
          <button class="mode-tab active" type="button" data-mode="interval">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><path d="M12 7v5l3 2"></path></svg>
            In
          </button>
          <button class="mode-tab" type="button" data-mode="specific">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"></path><path d="M16 2v4"></path><rect x="3" y="4" width="18" height="18" rx="2"></rect><path d="M3 10h18"></path></svg>
            At
          </button>
          <button class="mode-tab" type="button" data-mode="tpd">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"></path><path d="M21 3v7h-7"></path></svg>
            Daily
          </button>
          <button class="mode-tab" type="button" data-mode="random">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"></path><path d="M4 20 21 3"></path><path d="M21 16v5h-5"></path><path d="M15 15l6 6"></path><path d="M4 4l5 5"></path></svg>
            Random
          </button>
          <button class="mode-tab" type="button" data-mode="ntimes-in-period">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21v-7"></path><path d="M4 10V3"></path><path d="M12 21v-9"></path><path d="M12 8V3"></path><path d="M20 21v-5"></path><path d="M20 12V3"></path><path d="M2 14h4"></path><path d="M10 8h4"></path><path d="M18 16h4"></path></svg>
            More
          </button>
        </div>

        <div class="option-grid">
          <div class="config active" id="config-interval">
            <span class="field-label">Every</span>
            <input type="number" id="intervalValue" value="30" min="1" max="9999" inputmode="numeric">
            <select id="intervalUnit" aria-label="Interval unit">
              <option value="minutes">minutes</option>
              <option value="hours">hours</option>
              <option value="seconds">seconds</option>
            </select>
          </div>
          <div class="config" id="config-specific">
            <span class="field-label">At</span>
            <input type="time" id="specificTime" value="09:00">
          </div>
          <div class="config" id="config-tpd">
            <input type="number" id="timesPerDay" value="4" min="1" max="48" inputmode="numeric">
            <span class="field-label">times per day</span>

<div class="toast hidden" id="toast" role="status" aria-live="polite">

    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 8-3 8h18s-3-1-3-8"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>

<script>
const STORAGE_KEY = "notiminder-v2";
const OLD_STORAGE_KEY = "remindme-v4";

const els = {
  notifyBtn: document.getElementById("notifyBtn"),
  notifyState: document.getElementById("notifyState"),
  installBtn: document.getElementById("installBtn"),
  timeDial: document.getElementById("timeDial"),
  dialMain: document.getElementById("dialMain"),
  dialSub: document.getElementById("dialSub"),
  nextMini: document.getElementById("nextMini"),
  ampmGroup: document.getElementById("ampmGroup"),
  reminderName: document.getElementById("reminderName"),
  addBtn: document.getElementById("addBtn"),
  testComposerBtn: document.getElementById("testComposerBtn"),
  clearBtn: document.getElementById("clearBtn"),
  list: document.getElementById("reminderList"),
  empty: document.getElementById("emptyState"),
  listCount: document.getElementById("listCount"),
  activeStat: document.getElementById("activeStat"),
  firedStat: document.getElementById("firedStat"),
  totalStat: document.getElementById("totalStat"),
  nextStat: document.getElementById("nextStat"),
  toast: document.getElementById("toast"),
  toastTitle: document.getElementById("toastTitle"),
  toastBody: document.getElementById("toastBody"),
  toastClose: document.getElementById("toastClose"),
  intervalValue: document.getElementById("intervalValue"),
  intervalUnit: document.getElementById("intervalUnit"),
  specificTime: document.getElementById("specificTime"),
  timesPerDay: document.getElementById("timesPerDay"),
  randomCount: document.getElementById("randomCount"),
  randomStart: document.getElementById("randomStart"),
  randomEnd: document.getElementById("randomEnd"),
  periodCount: document.getElementById("periodCount"),
  periodDuration: document.getElementById("periodDuration"),
  periodUnit: document.getElementById("periodUnit")
};

let reminders = [];
let currentMode = "interval";
let dialMinutes = 9 * 60;
let toastTimer = 0;
let swRegistration = null;
let deferredInstallPrompt = null;
let tickLocked = false;

const icons = {
  play: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"></polygon></svg>',
  trash: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="m19 6-1 14H6L5 6"></path></svg>'
};

function secureForServiceWorker(){
  return location.protocol === "https:" || location.hostname === "localhost" || location.hostname === "127.0.0.1";
}

async function registerServiceWorker(){
  if(!("serviceWorker" in navigator) || !secureForServiceWorker()) return null;
  try{
    swRegistration = await navigator.serviceWorker.register("./sw.js");
    return swRegistration;
  }catch(err){
    return null;
  }
}

async function getReadyRegistration(){
  if(!("serviceWorker" in navigator) || !secureForServiceWorker()) return null;
  if(!swRegistration) await registerServiceWorker();
  try{
    return await Promise.race([
      navigator.serviceWorker.ready,
      new Promise(resolve => setTimeout(() => resolve(swRegistration), 900))
    ]);
  }catch(err){
    return swRegistration;
  }
}

function notificationSupportState(){
  if(!("Notification" in window)) return "unsupported";
  if(!window.isSecureContext && location.protocol !== "file:") return "insecure";
  return Notification.permission;
}

function updateNotificationUI(){
  const state = notificationSupportState();
  if(state === "granted") els.notifyState.textContent = "Allowed";
  else if(state === "denied") els.notifyState.textContent = "Blocked";
  else if(state === "unsupported") els.notifyState.textContent = "Unavailable";
  else if(state === "insecure") els.notifyState.textContent = "Needs HTTPS";
  else els.notifyState.textContent = "Allow";
}

async function requestNativeNotifications(){
  if(!("Notification" in window)){
    showToast("Native alerts unavailable", "This browser does not support notifications.");
    updateNotificationUI();
    return false;
  }

  if(notificationSupportState() === "insecure"){
    showToast("Use localhost or HTTPS", "Native alerts need a secure browser context.");
    updateNotificationUI();
    return false;
  }

  let result = Notification.permission;
  if(result === "default") result = await Notification.requestPermission();
  updateNotificationUI();

  if(result === "granted"){
    await registerServiceWorker();
    await showNativeNotification({ id:"ready", name:"Notiminder alerts are ready", mode:"system", firedToday:0 }, true);
    return true;
  }

  if(result === "denied") showToast("Notifications blocked", "Allow Notiminder in browser settings.");
  return false;
}

async function showNativeNotification(reminder, isTest){
  if(!("Notification" in window) || Notification.permission !== "granted") return false;
  const title = isTest && reminder.id !== "ready" ? "Test: " + reminder.name : reminder.name;
  const body = reminder.id === "ready"
    ? "Real browser notifications are enabled."
    : (schedDesc(reminder) + " - " + (isTest ? "test alert" : "fired today: " + (reminder.firedToday || 0)));
  const options = {
    body,
    tag:"notiminder-" + reminder.id,
    renotify:true,
    icon:"./icon-192.png",
    badge:"./icon-192.png",
    vibrate:[160,70,160],
    data:{ id:reminder.id, url:location.href },
    actions:[{ action:"open", title:"Open" }]
  };

  const registration = await getReadyRegistration();
  try{
    if(registration && registration.showNotification){
      await registration.showNotification(title, options);
      return true;
    }
  }catch(err){}

  try{
    new Notification(title, options);
    return true;
  }catch(err){
    return false;
  }
}

function showToast(title, body){
  clearTimeout(toastTimer);
  els.toastTitle.textContent = title;
  els.toastBody.textContent = body;
  els.toast.classList.remove("hidden");
  toastTimer = setTimeout(hideToast, 6000);
}

function hideToast(){ els.toast.classList.add("hidden"); }
function storeRead(key){ try{return localStorage.getItem(key);}catch(err){return null;} }
function storeWrite(key,value){ try{localStorage.setItem(key,value);}catch(err){} }

async function loadReminders(){
  let raw = storeRead(STORAGE_KEY) || storeRead(OLD_STORAGE_KEY);
  if(!raw && window.storage && window.storage.get){
    try{
      const old = await window.storage.get(OLD_STORAGE_KEY);
      raw = old && old.value;
    }catch(err){}
  }
  try{ reminders = raw ? JSON.parse(raw) : []; }catch(err){ reminders = []; }
  reminders = reminders.map(normalizeReminder).filter(Boolean);
  const now = Date.now();
  reminders.forEach(reminder => {
    resetDailyCount(reminder);
    if(reminder.enabled && (!reminder.nft || reminder.nft <= now)) scheduleNext(reminder, now);
  });
  saveReminders();
  render();
  updateStats();
}

function saveReminders(){
  storeWrite(STORAGE_KEY, JSON.stringify(reminders));
  if(window.storage && window.storage.set) window.storage.set(STORAGE_KEY, JSON.stringify(reminders)).catch(() => {});
}

function normalizeReminder(reminder){
  if(!reminder || !reminder.id || !reminder.name) return null;
  const mode = reminder.mode || "interval";
  const normalized = {
    id:String(reminder.id),
    name:String(reminder.name),
    mode,
    enabled:reminder.enabled !== false,
    firedToday:Number(reminder.firedToday || 0),
    ftDate:reminder.ftDate || todayKey(),
    createdAt:Number(reminder.createdAt || Date.now()),
    lastFire:Number(reminder.lastFire || Date.now()),
    nft:Number(reminder.nft || 0)
  };
  if(mode === "interval"){
    normalized.iv = clampNumber(reminder.iv, 1, 9999, 30);
    normalized.iu = ["seconds","minutes","hours"].includes(reminder.iu) ? reminder.iu : "minutes";
  }
  if(mode === "tpd") normalized.tpd = clampNumber(reminder.tpd, 1, 48, 4);
  if(mode === "random"){
    normalized.rc = clampNumber(reminder.rc, 1, 100, 6);
    normalized.ws = validTime(reminder.ws) ? reminder.ws : "08:00";
    normalized.we = validTime(reminder.we) ? reminder.we : "22:00";
    normalized.rq = Array.isArray(reminder.rq) ? reminder.rq.map(Number).filter(Boolean) : [];
  }
  if(mode === "specific") normalized.stime = validTime(reminder.stime) ? reminder.stime : "09:00";
  if(mode === "ntimes-in-period"){
    normalized.np = clampNumber(reminder.np, 1, 60, 4);
    normalized.npDur = clampNumber(reminder.npDur, 1, 60, 1);
    normalized.npUnit = reminder.npUnit === "minute" ? "minute" : "hour";
  }
  return normalized;
}

function clampNumber(value,min,max,fallback){
  const num = Number(value);
  if(!Number.isFinite(num)) return fallback;
  return Math.max(min, Math.min(max, Math.round(num)));
}

function validTime(value){ return typeof value === "string" && /^\d{2}:\d{2}$/.test(value); }
function genId(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function todayKey(){ return new Date().toDateString(); }
function resetDailyCount(reminder){
  const today = todayKey();
  if(reminder.ftDate !== today){
    reminder.firedToday = 0;
    reminder.ftDate = today;
  }
}
function pad(value){ return String(value).padStart(2,"0"); }
function parseTime(value){
  if(!validTime(value)) return 0;
  const parts = value.split(":").map(Number);
  return parts[0] * 60 + parts[1];
}
function minutesToInput(minutes){
  const normalized = ((minutes % 1440) + 1440) % 1440;
  return pad(Math.floor(normalized / 60)) + ":" + pad(normalized % 60);
}
function formatClock(minutes){
  const normalized = ((minutes % 1440) + 1440) % 1440;
  const h24 = Math.floor(normalized / 60);
  const mins = normalized % 60;
  const suffix = h24 >= 12 ? "PM" : "AM";
  const h12 = h24 % 12 || 12;
  return h12 + ":" + pad(mins) + " " + suffix;
}
function timeMs(value){ return parseTime(value) * 60000; }
function intervalMs(reminder){
  const value = clampNumber(reminder.iv, 1, 9999, 30);
  if(reminder.iu === "hours") return value * 3600000;
  if(reminder.iu === "seconds") return value * 1000;
  return value * 60000;
}
function generateRandomQueue(reminder, base){
  const d = new Date(base);
  const midnight = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
  let start = midnight + timeMs(reminder.ws || "08:00");
  let end = midnight + timeMs(reminder.we || "22:00");
  if(end <= start) end += 86400000;
  const count = clampNumber(reminder.rc, 1, 100, 6);
  return Array.from({ length:count }, () => start + Math.random() * (end - start)).sort((a,b) => a - b);
}
function nextFire(reminder, from = Date.now()){
  if(reminder.mode === "interval") return from + intervalMs(reminder);
  if(reminder.mode === "tpd"){
    const d = new Date(from);
    const midnight = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
    const start = midnight + 8 * 3600000;
    const end = midnight + 22 * 3600000;
    const count = clampNumber(reminder.tpd, 1, 48, 4);
    const slot = (end - start) / count;
    for(let i = 0; i < count; i += 1){
      const candidate = start + slot * i;
      if(candidate > from) return candidate;
    }
    return start + 86400000;
  }
  if(reminder.mode === "random"){
    if(!Array.isArray(reminder.rq) || !reminder.rq.length) reminder.rq = generateRandomQueue(reminder, from);
    const next = reminder.rq.find(time => time > from);
    if(next) return next;
    reminder.rq = generateRandomQueue(reminder, from + 86400000);
    return reminder.rq[0] || from + 3600000;
  }
  if(reminder.mode === "specific"){
    const [hours,minutes] = (reminder.stime || "09:00").split(":").map(Number);
    const d = new Date(from);
    let candidate = new Date(d.getFullYear(), d.getMonth(), d.getDate(), hours, minutes, 0, 0).getTime();
    if(candidate <= from) candidate += 86400000;
    return candidate;
  }
  if(reminder.mode === "ntimes-in-period"){
    const periodMs = reminder.npUnit === "minute" ? reminder.npDur * 60000 : reminder.npDur * 3600000;
    return from + periodMs / Math.max(1, reminder.np);
  }
  return from + 3600000;
}
function scheduleNext(reminder, from = Date.now()){
  reminder.lastFire = from;
  reminder.nft = nextFire(reminder, from);
}
function schedDesc(reminder){
  if(reminder.mode === "interval") return "Every " + reminder.iv + " " + reminder.iu;
  if(reminder.mode === "tpd") return reminder.tpd + " times daily";
  if(reminder.mode === "random") return reminder.rc + " random, " + reminder.ws + "-" + reminder.we;
  if(reminder.mode === "specific") return "Daily at " + formatClock(parseTime(reminder.stime));
  if(reminder.mode === "ntimes-in-period"){
    const unit = reminder.npUnit;
    return reminder.np + " times every " + reminder.npDur + " " + unit + (reminder.npDur === 1 ? "" : "s");
  }
  return "Reminder";
}
function fmtRemaining(ts){
  if(!ts) return "--";
  const diff = ts - Date.now();
  if(diff <= 0) return "now";
  if(diff < 60000) return Math.max(1, Math.ceil(diff / 1000)) + "s";
  if(diff < 3600000) return Math.ceil(diff / 60000) + "m";
  if(diff < 86400000) return Math.ceil(diff / 3600000) + "h";
  return Math.ceil(diff / 86400000) + "d";
}
function fmtNextLabel(ts){
  if(!ts) return "--";
  const diff = ts - Date.now();
  if(diff < 0) return "now";
  if(diff < 86400000) return formatClock(new Date(ts).getHours() * 60 + new Date(ts).getMinutes());
  const d = new Date(ts);
  return d.toLocaleDateString(undefined, { month:"short", day:"numeric" });
}
function escapeHtml(value){
  return String(value).replace(/[&<>"']/g, char => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  })[char]);
}
function currentFormReminder(){
  const name = els.reminderName.value.trim() || "Test reminder";
  const reminder = { id:genId(), name, mode:currentMode, enabled:true, firedToday:0, ftDate:todayKey(), createdAt:Date.now() };
  if(currentMode === "interval"){
    reminder.iv = clampNumber(els.intervalValue.value, 1, 9999, 30);
    reminder.iu = els.intervalUnit.value;
  }
  if(currentMode === "specific") reminder.stime = els.specificTime.value || "09:00";
  if(currentMode === "tpd") reminder.tpd = clampNumber(els.timesPerDay.value, 1, 48, 4);
  if(currentMode === "random"){
    reminder.rc = clampNumber(els.randomCount.value, 1, 100, 6);
    reminder.ws = els.randomStart.value || "08:00";
    reminder.we = els.randomEnd.value || "22:00";
    reminder.rq = generateRandomQueue(reminder, Date.now());
  }
  if(currentMode === "ntimes-in-period"){
    reminder.np = clampNumber(els.periodCount.value, 1, 60, 4);
    reminder.npDur = clampNumber(els.periodDuration.value, 1, 60, 1);
    reminder.npUnit = els.periodUnit.value === "minute" ? "minute" : "hour";
  }
  scheduleNext(reminder, Date.now());
  return reminder;
}
async function addReminder(){
  const name = els.reminderName.value.trim();
  if(!name){
    els.reminderName.focus();
    showToast("Name the reminder", "Add a short title before saving.");
    return;
  }
  const reminder = currentFormReminder();
  reminders.push(reminder);
  els.reminderName.value = "";
  saveReminders();
  render();
  updateStats();
  if(notificationSupportState() === "default") await requestNativeNotifications();
}
function setMode(mode){
  currentMode = mode;
  document.querySelectorAll(".mode-tab").forEach(btn => btn.classList.toggle("active", btn.dataset.mode === mode));
  document.querySelectorAll(".config").forEach(config => config.classList.toggle("active", config.id === "config-" + mode));
  updateDial();
}
function setSpecificFromDial(minutes){
  dialMinutes = ((minutes % 1440) + 1440) % 1440;
  els.specificTime.value = minutesToInput(dialMinutes);
  updateAmpm();
}
function updateAmpm(){
  const period = dialMinutes >= 720 ? "PM" : "AM";
  els.ampmGroup.querySelectorAll("button").forEach(btn => btn.classList.toggle("active", btn.dataset.period === period));
}
function updateDial(){
  let angle = 180;
  let main = "30m";
  let sub = "Every 30 minutes";
  let valueNow = 0;
  let valueMax = 1439;
  if(currentMode === "interval"){
    const value = clampNumber(els.intervalValue.value, 1, 9999, 30);
    const unit = els.intervalUnit.value;
    const unitText = unit === "seconds" ? "s" : unit === "hours" ? "h" : "m";
    const mod = unit === "hours" ? 12 : unit === "seconds" ? 60 : 120;
    angle = (value % mod) / mod * 360;
    main = value + unitText;
    sub = "Every " + value + " " + unit;
    valueNow = value;
    valueMax = mod;
  }
  if(currentMode === "specific"){
    dialMinutes = parseTime(els.specificTime.value || "09:00");
    angle = (dialMinutes % 720) / 720 * 360;
    main = formatClock(dialMinutes);
    sub = "Daily";
    valueNow = dialMinutes;
    valueMax = 1439;
  }
  if(currentMode === "tpd"){
    const count = clampNumber(els.timesPerDay.value, 1, 48, 4);
    angle = count / 48 * 360;
    main = count + "/day";
    sub = "Daily";
    valueNow = count;
    valueMax = 48;
  }
  if(currentMode === "random"){
    const count = clampNumber(els.randomCount.value, 1, 100, 6);
    angle = count / 100 * 360;
    main = count + "x";
    sub = els.randomStart.value + "-" + els.randomEnd.value;
    valueNow = count;
    valueMax = 100;
  }
  if(currentMode === "ntimes-in-period"){
    const count = clampNumber(els.periodCount.value, 1, 60, 4);
    const duration = clampNumber(els.periodDuration.value, 1, 60, 1);
    const unit = els.periodUnit.value;
    angle = count / 60 * 360;
    main = count + "x";
    sub = duration + " " + unit + (duration === 1 ? "" : "s");
    valueNow = count;
    valueMax = 60;
  }
  els.timeDial.style.setProperty("--dial-angle", angle + "deg");
  els.dialMain.textContent = main;
  els.dialSub.textContent = sub;
  els.timeDial.setAttribute("aria-valuenow", String(Math.round(valueNow)));
  els.timeDial.setAttribute("aria-valuemax", String(valueMax));
  updateAmpm();
}
function pointerAngle(event){
  const rect = els.timeDial.getBoundingClientRect();
  const x = event.clientX - rect.left - rect.width / 2;
  const y = event.clientY - rect.top - rect.height / 2;
  return (Math.atan2(y, x) * 180 / Math.PI + 90 + 360) % 360;
}
function updateDialFromPointer(event){
  const angle = pointerAngle(event);
  if(currentMode === "specific"){
    const halfDay = dialMinutes >= 720 ? 720 : 0;
    let minutes = Math.round((angle / 360) * 720 / 5) * 5;
    if(minutes >= 720) minutes = 0;
    setSpecificFromDial(halfDay + minutes);
  }else if(currentMode === "interval"){
    let minutes = Math.round((angle / 360) * 120 / 5) * 5;
    if(minutes <= 0) minutes = 5;
    els.intervalUnit.value = "minutes";
    els.intervalValue.value = minutes;
  }
  updateDial();
}
function render(){
  els.listCount.textContent = String(reminders.length);
  els.empty.classList.toggle("hidden", reminders.length > 0);
  els.list.innerHTML = reminders.map(reminder => {
    resetDailyCount(reminder);
    const enabled = reminder.enabled;
    return '<article class="reminder-row ' + (enabled ? "" : "off") + '" data-id="' + reminder.id + '">' +
      '<span class="accent-line" aria-hidden="true"></span>' +
      '<div class="reminder-main">' +
        '<div class="reminder-name">' + escapeHtml(reminder.name) + '</div>' +
        '<div class="reminder-meta"><span class="tag">' + escapeHtml(schedDesc(reminder)) + '</span><span class="tag blue">fired today: ' + (reminder.firedToday || 0) + '</span></div>' +
        '<div class="progress"><i id="progress-' + reminder.id + '"></i></div>' +
      '</div>' +
      '<div class="next-cell"><strong id="remaining-' + reminder.id + '">' + (enabled ? fmtRemaining(reminder.nft) : "--") + '</strong><span id="next-' + reminder.id + '">' + (enabled ? fmtNextLabel(reminder.nft) : "paused") + '</span></div>' +
      '<button class="switch ' + (enabled ? "on" : "") + '" data-action="toggle" data-id="' + reminder.id + '" type="button" aria-label="' + (enabled ? "Pause" : "Resume") + ' reminder"></button>' +
      '<div class="row-tools">' +
        '<button class="tool-btn" data-action="test" data-id="' + reminder.id + '" type="button">' + icons.play + '<span>Test</span></button>' +
        '<button class="tool-btn delete" data-action="delete" data-id="' + reminder.id + '" type="button">' + icons.trash + '<span>Delete</span></button>' +
      '</div>' +
    '</article>';
  }).join("");
  updateCountdowns();
}
function updateStats(){
  const active = reminders.filter(reminder => reminder.enabled).length;
  const today = todayKey();
  const fired = reminders.reduce((sum, reminder) => sum + (reminder.ftDate === today ? Number(reminder.firedToday || 0) : 0), 0);
  const next = reminders.filter(reminder => reminder.enabled && reminder.nft).sort((a,b) => a.nft - b.nft)[0];
  els.activeStat.textContent = String(active);
  els.firedStat.textContent = String(fired);
  els.totalStat.textContent = String(reminders.length);
  els.nextStat.textContent = next ? fmtRemaining(next.nft) : "--";
  els.nextMini.textContent = next ? fmtRemaining(next.nft) + " - " + escapePlain(next.name) : "No reminders";
}
function escapePlain(value){ return String(value).replace(/\s+/g," ").slice(0,32); }
function updateCountdowns(){
  const now = Date.now();
  reminders.forEach(reminder => {
    const remaining = document.getElementById("remaining-" + reminder.id);
    const next = document.getElementById("next-" + reminder.id);
    const progress = document.getElementById("progress-" + reminder.id);
    if(remaining) remaining.textContent = reminder.enabled ? fmtRemaining(reminder.nft) : "--";
    if(next) next.textContent = reminder.enabled ? fmtNextLabel(reminder.nft) : "paused";
    if(progress){
      if(!reminder.enabled || !reminder.nft) progress.style.width = "0%";
      else{
        const start = Number(reminder.lastFire || now);
        const total = Math.max(1, reminder.nft - start);
        const remain = Math.max(0, reminder.nft - now);
        progress.style.width = Math.max(0, Math.min(100, remain / total * 100)) + "%";
      }
    }
  });
}
function chime(){
  try{
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if(!AudioCtx) return;
    const ctx = new AudioCtx();
    [523.25,659.25,783.99].forEach((frequency,index) => {
      const oscillator = ctx.createOscillator();
      const gain = ctx.createGain();
      oscillator.connect(gain);
      gain.connect(ctx.destination);
      oscillator.type = "sine";
      oscillator.frequency.value = frequency;
      const start = ctx.currentTime + index * .13;
      gain.gain.setValueAtTime(.001, start);
      gain.gain.exponentialRampToValueAtTime(.16, start + .04);
      gain.gain.exponentialRampToValueAtTime(.001, start + .38);
      oscillator.start(start);
      oscillator.stop(start + .42);
    });
  }catch(err){}
}
function vibrate(){ try{ if(navigator.vibrate) navigator.vibrate([160,70,160]); }catch(err){} }
async function fireReminder(reminder, isTest = false){
  resetDailyCount(reminder);
  if(!isTest){
    reminder.firedToday = Number(reminder.firedToday || 0) + 1;
    scheduleNext(reminder, Date.now() + 250);
    saveReminders();
  }
  render();
  updateStats();
  const row = document.querySelector('[data-id="' + reminder.id + '"]');
  if(row){
    row.classList.add("firing");
    setTimeout(() => row.classList.remove("firing"), 1400);
  }
  const nativeShown = await showNativeNotification(reminder, isTest);
  chime();
  vibrate();
  if(!nativeShown) showToast(isTest ? "Test alert" : "Reminder", reminder.name + " - " + schedDesc(reminder));
}
async function tick(){
  if(tickLocked) return;
  tickLocked = true;
  try{
    const now = Date.now();
    for(const reminder of reminders){
      if(reminder.enabled && reminder.nft && reminder.nft <= now) await fireReminder(reminder, false);
    }
    updateCountdowns();
    updateStats();
  }finally{ tickLocked = false; }
}
function toggleReminder(id){
  const reminder = reminders.find(item => item.id === id);
  if(!reminder) return;
  reminder.enabled = !reminder.enabled;
  if(reminder.enabled){
    if(reminder.mode === "random") reminder.rq = generateRandomQueue(reminder, Date.now());
    scheduleNext(reminder, Date.now());
  }
  saveReminders();
  render();
  updateStats();
}
function deleteReminder(id){
  reminders = reminders.filter(item => item.id !== id);
  saveReminders();
  render();
  updateStats();
}
function clearReminders(){
  if(!reminders.length) return;
  if(confirm("Delete all reminders?")){
    reminders = [];
    saveReminders();
    render();
    updateStats();
  }
}
function setupEvents(){
  document.querySelectorAll(".mode-tab").forEach(btn => btn.addEventListener("click", () => setMode(btn.dataset.mode)));
  [els.intervalValue,els.intervalUnit,els.specificTime,els.timesPerDay,els.randomCount,els.randomStart,els.randomEnd,els.periodCount,els.periodDuration,els.periodUnit].forEach(input => input.addEventListener("input", updateDial));
  els.addBtn.addEventListener("click", addReminder);
  els.testComposerBtn.addEventListener("click", async () => {
    if(notificationSupportState() === "default") await requestNativeNotifications();
    await fireReminder(currentFormReminder(), true);
  });
  els.notifyBtn.addEventListener("click", requestNativeNotifications);
  els.clearBtn.addEventListener("click", clearReminders);
  els.toastClose.addEventListener("click", hideToast);
  els.ampmGroup.addEventListener("click", event => {
    const button = event.target.closest("button[data-period]");
    if(!button) return;
    const base = dialMinutes % 720;
    setSpecificFromDial(button.dataset.period === "PM" ? base + 720 : base);
    if(currentMode !== "specific") setMode("specific");
  });
  let dragging = false;
  els.timeDial.addEventListener("pointerdown", event => {
    dragging = true;
    els.timeDial.setPointerCapture(event.pointerId);
    updateDialFromPointer(event);
  });
  els.timeDial.addEventListener("pointermove", event => {
    if(dragging) updateDialFromPointer(event);
  });
  els.timeDial.addEventListener("pointerup", event => {
    dragging = false;
    els.timeDial.releasePointerCapture(event.pointerId);
  });
  els.timeDial.addEventListener("pointercancel", () => { dragging = false; });
  els.list.addEventListener("click", async event => {
    const button = event.target.closest("[data-action]");
    if(!button) return;
    const id = button.dataset.id;
    if(button.dataset.action === "toggle") toggleReminder(id);
    if(button.dataset.action === "delete") deleteReminder(id);
    if(button.dataset.action === "test"){
      const reminder = reminders.find(item => item.id === id);
      if(reminder) await fireReminder(reminder, true);
    }
  });
  window.addEventListener("beforeinstallprompt", event => {
    event.preventDefault();
    deferredInstallPrompt = event;
    els.installBtn.classList.remove("hidden");
  });
  els.installBtn.addEventListener("click", async () => {
    if(!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    els.installBtn.classList.add("hidden");
  });
}
async function init(){
  setupEvents();
  dialMinutes = parseTime(els.specificTime.value);
  updateDial();
  updateNotificationUI();
  await registerServiceWorker();
  await loadReminders();
  setInterval(tick, 1000);
}
init();
</script>
